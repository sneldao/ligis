[package]
name = "ligis-contracts-casper"
version = "0.1.0"
edition = "2021"
description = "Odra (Casper) contracts for Ligis — agent identity & capability credentials"
license = "MIT"

[lib]
crate-type = ["rlib"]
bench = false

[dependencies]
odra = { version = "2.8.1", default-features = false }
odra-modules = { version = "2.8.1", default-features = false }
# Pure-Rust secp256k1 ECDSA recovery for on-chain signature verification.
k256 = { version = "0.13", default-features = false, features = ["ecdsa"] }
sha3 = { version = "0.10", default-features = false }

[dev-dependencies]
odra-test = { version = "2.8.1", default-features = false }
# For deterministic secp256k1 test keys. Used only in unit tests.
rand = "0.8"

[build-dependencies]
odra-build = { version = "2.8.1", default-features = false }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
odra-build = { version = "2.8.1", default-features = false }
odra-cli = { version = "2.8.1", default-features = false }

[[bin]]
name = "ligis_contracts_casper_build_contract"
path = "bin/build_contract.rs"
test = false

[[bin]]
name = "ligis_contracts_casper_build_schema"
path = "bin/build_schema.rs"
test = false

[[bin]]
name = "ligis_contracts_casper_cli"
path = "bin/cli.rs"
test = false

[features]
default = []

[profile.release]
codegen-units = 1
lto = true

[profile.dev.package."*"]
opt-level = 3
